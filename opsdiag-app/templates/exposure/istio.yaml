{{- if .Values.istio.enabled }}
{{- if .Values.istio.gateway.enabled }}
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ printf "%s-gateway" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" .) | nindent 4 }}
  {{- with .Values.istio.gateway.annotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  selector:
    {{- include "common.tplvalues.render" (dict "value" .Values.istio.gateway.selector "context" .) | nindent 4 }}
  servers:
    {{- include "common.tplvalues.render" (dict "value" .Values.istio.gateway.servers "context" .) | nindent 4 }}
{{- end }}
{{- if .Values.istio.virtualService.enabled }}
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" .) | nindent 4 }}
  {{- with .Values.istio.virtualService.annotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  hosts:
    {{- include "common.tplvalues.render" (dict "value" .Values.istio.virtualService.hosts "context" .) | nindent 4 }}
  gateways:
    - {{ printf "%s-gateway" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}
  http:
    {{- include "common.tplvalues.render" (dict "value" .Values.istio.virtualService.http "context" .) | nindent 4 }}
{{- end }}
{{- end }}
