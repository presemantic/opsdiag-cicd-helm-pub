{{- if .Values.openshiftRoute.enabled }}
{{- $hostname := tpl (required "openshiftRoute.hostname is required when openshiftRoute.enabled is true" .Values.openshiftRoute.hostname) . }}
{{- range $route := list (dict "name" "oauth-resource" "component" "mcp-proxy" "path" "/.well-known/oauth-protected-resource") (dict "name" "oauth-metadata" "component" "api" "path" "/.well-known") (dict "name" "mcp-oauth" "component" "api" "path" "/mcp/oauth") (dict "name" "mcp-proxy" "component" "mcp-proxy" "path" "/mcp") (dict "name" "vcs-hooks" "component" "vcs" "path" "/api/vcs/hooks") (dict "name" "api" "component" "api" "path" "/api") (dict "name" "front" "component" "front" "path" "/") }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ printf "%s-%s" (include "common.names.fullname" $) $route.name | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "common.names.namespace" $ | quote }}
  labels:
    {{- include "common.labels.standard" (dict "customLabels" $.Values.commonLabels "context" $) | nindent 4 }}
  {{- if or $.Values.openshiftRoute.annotations $.Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" (dict "values" (list $.Values.openshiftRoute.annotations $.Values.commonAnnotations) "context" $) }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" $annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  host: {{ $hostname | quote }}
  path: {{ $route.path | quote }}
  to:
    kind: Service
    name: {{ include "opsdiag-app.componentServiceName" (dict "root" $ "component" $route.component) }}
    weight: 100
  port:
    targetPort: http
  {{- if $.Values.openshiftRoute.tls.enabled }}
  tls:
    {{- include "opsdiag-app.openshiftRouteTLS" $ | nindent 4 }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
{{- range $index, $host := .Values.openshiftRoute.extraHosts }}
{{- range $route := list (dict "name" "oauth-resource" "component" "mcp-proxy" "path" "/.well-known/oauth-protected-resource") (dict "name" "oauth-metadata" "component" "api" "path" "/.well-known") (dict "name" "mcp-oauth" "component" "api" "path" "/mcp/oauth") (dict "name" "mcp-proxy" "component" "mcp-proxy" "path" "/mcp") (dict "name" "vcs-hooks" "component" "vcs" "path" "/api/vcs/hooks") (dict "name" "api" "component" "api" "path" "/api") (dict "name" "front" "component" "front" "path" "/") }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ printf "%s-%s-%d" (include "common.names.fullname" $) $route.name $index | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "common.names.namespace" $ | quote }}
  labels:
    {{- include "common.labels.standard" (dict "customLabels" $.Values.commonLabels "context" $) | nindent 4 }}
  {{- if or $.Values.openshiftRoute.annotations $.Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" (dict "values" (list $.Values.openshiftRoute.annotations $.Values.commonAnnotations) "context" $) }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" $annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  host: {{ tpl (required "openshiftRoute.extraHosts[].name is required" $host.name) $ | quote }}
  path: {{ $route.path | quote }}
  to:
    kind: Service
    name: {{ include "opsdiag-app.componentServiceName" (dict "root" $ "component" $route.component) }}
    weight: 100
  port:
    targetPort: http
  {{- if $.Values.openshiftRoute.tls.enabled }}
  tls:
    {{- include "opsdiag-app.openshiftRouteTLS" $ | nindent 4 }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
{{- end }}
{{- range $index, $route := .Values.openshiftRoute.extraRoutes }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ printf "%s-extra-%d" (include "common.names.fullname" $) $index | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "common.names.namespace" $ | quote }}
  labels:
    {{- include "common.labels.standard" (dict "customLabels" $.Values.commonLabels "context" $) | nindent 4 }}
  {{- if or $route.annotations $.Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" (dict "values" (list ($route.annotations | default dict) $.Values.commonAnnotations) "context" $) }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" $annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  {{- include "common.tplvalues.render" (dict "value" (required "openshiftRoute.extraRoutes[].spec is required" $route.spec) "context" $) | nindent 2 }}
{{- end }}
{{- end }}
