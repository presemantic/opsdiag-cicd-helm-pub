{{- if .Values.openshiftRoute.enabled }}
{{- range $item := .Values.openshiftRoute.items }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ printf "%s-%s" (include "common.names.fullname" $) ($item.name | required "OpenShift Route item name is required") | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "common.names.namespace" $ | quote }}
  labels:
    {{- include "common.labels.standard" (dict "customLabels" $.Values.commonLabels "context" $) | nindent 4 }}
  {{- with $item.annotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  {{- with $item.host }}
  host: {{ . | quote }}
  {{- end }}
  {{- with $item.path }}
  path: {{ . | quote }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "opsdiag-app.componentServiceName" (dict "root" $ "component" $item.component) }}
    weight: 100
  port:
    targetPort: {{ default "http" $item.targetPort | quote }}
  {{- with $item.tls }}
  tls:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
  wildcardPolicy: {{ default "None" $item.wildcardPolicy }}
{{- end }}
{{- end }}
