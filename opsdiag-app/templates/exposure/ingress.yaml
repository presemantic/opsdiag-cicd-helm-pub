{{- if .Values.ingress.enabled }}
{{- range $item := .Values.ingress.items }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ default (printf "%s-%s" (include "common.names.fullname" $) ($item.name | required "ingress item name is required")) $item.fullnameOverride | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "common.names.namespace" $ | quote }}
  labels:
    {{- include "common.labels.standard" (dict "customLabels" $.Values.commonLabels "context" $) | nindent 4 }}
  {{- with $item.annotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  {{- with $item.ingressClassName }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with $item.tls }}
  tls:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
  rules:
    {{- range $rule := $item.rules }}
    - host: {{ $rule.host | quote }}
      http:
        paths:
          {{- range $path := $rule.paths }}
          - path: {{ $path.path | quote }}
            pathType: {{ default "Prefix" $path.pathType }}
            backend:
              service:
                name: {{ include "opsdiag-app.componentServiceName" (dict "root" $ "component" $path.component) }}
                port:
                  {{- if $path.portNumber }}
                  number: {{ $path.portNumber }}
                  {{- else }}
                  name: {{ default "http" $path.portName | quote }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
