## @section Global parameters
##
## Global image parameters
##
## @param global.imageRegistry Global container image registry override
## @param global.imagePullSecrets Global container registry secret names as an array
##
global:
  imageRegistry: ""
  imagePullSecrets: []

## Common chart parameters
##
## @param nameOverride String to partially override the chart name
## @param fullnameOverride String to fully override generated resource names
## @param namespaceOverride String to fully override the release namespace
## @param commonLabels Labels to add to every deployed resource
## @param commonAnnotations Annotations to add to every deployed resource
## @param extraDeploy Additional Kubernetes objects to deploy with the release
##
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
commonLabels: {}
commonAnnotations: {}
extraDeploy: []

## @section App API parameters
##
## @param api.replicaCount Number of App API replicas
## @param api.revisionHistoryLimit Number of previous ReplicaSets retained for rollback
##
api:
  replicaCount: 2
  revisionHistoryLimit: 10

  ## App API image
  ##
  ## @param api.image.registry App API image registry
  ## @param api.image.repository App API image repository
  ## @param api.image.tag App API image tag
  ## @param api.image.digest App API image digest; overrides the tag when set
  ## @param api.image.pullPolicy App API image pull policy
  ## @param api.image.pullSecrets App API image pull secrets
  ##
  image:
    registry: europe-west1-docker.pkg.dev
    repository: prod-common-cicd/opsdiag-docker-pub/opsdiag-app-api
    tag: "2026-07-19.03-54-13.9552502"
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []

  ## App API deployment and runtime
  ##
  ## @param api.updateStrategy App API Deployment update strategy
  ## @param api.updateStrategy.type App API Deployment strategy type
  ## @param api.config App API runtime configuration rendered to `/app/config.yaml`
  ## @param api.config.license App API license
  ## @param api.config.licenseServer Control Edge origin used for App API license verification
  ## @param api.config.database.url PostgreSQL connection URL
  ## @param api.config.agent.url Internal App Agent run URL; rendered from the Helm release name
  ## @param api.config.internal.baseUrl Internal App API base URL; rendered from the Helm release name
  ## @param api.config.modelProfileSecret Encryption key for tenant model-profile credentials
  ## @param api.config.auth.username Config-managed bootstrap username
  ## @param api.config.auth.password Config-managed bootstrap password
  ## @param api.config.auth.jwtSecret HMAC secret used for App API authentication tokens
  ## @param api.config.auth.jwtExpiresSeconds Lifetime of App API authentication tokens in seconds
  ## @param api.config.scheduler.url Internal App Scheduler URL; rendered from the Helm release name
  ## @param api.config.scheduler.workerToken Shared App Scheduler worker token
  ##
  updateStrategy:
    type: RollingUpdate

  config:
    license: ""
    licenseServer: https://edge.control.opsdiag.ai
    database:
      url: ""
    agent:
      url: 'http://{{ include "opsdiag-app.componentName" (dict "root" . "component" "agent") }}:{{ .Values.agent.service.ports.http }}/api/run'
    internal:
      baseUrl: 'http://{{ include "opsdiag-app.componentName" (dict "root" . "component" "api") }}:{{ .Values.api.service.ports.http }}'
    modelProfileSecret: ""
    auth:
      username: ""
      password: ""
      jwtSecret: ""
      jwtExpiresSeconds: 86400
    scheduler:
      url: 'http://{{ include "opsdiag-app.componentName" (dict "root" . "component" "sched") }}:{{ .Values.sched.service.ports.http }}'
      workerToken: ""

  ## Additional App API deployment settings
  ##
  ## @param api.extraEnvVars Additional environment variables for the App API container
  ## @param api.extraEnvVarsCM Existing ConfigMap containing additional App API environment variables
  ## @param api.extraEnvVarsSecret Existing Secret containing additional App API environment variables
  ## @param api.extraVolumes Additional volumes for App API pods
  ## @param api.extraVolumeMounts Additional volume mounts for the App API container
  ## @param api.extraDeploy Additional Kubernetes objects associated with App API
  ##
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  extraDeploy: []

  ## App API ServiceAccount
  ##
  ## @param api.serviceAccount.create Create a ServiceAccount for App API
  ## @param api.serviceAccount.name App API ServiceAccount name; generated when empty
  ## @param api.serviceAccount.annotations Additional App API ServiceAccount annotations
  ## @param api.serviceAccount.automountServiceAccountToken Mount the ServiceAccount token in App API pods
  ##
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  ## App API security contexts
  ##
  ## @param api.podSecurityContext.enabled Enable App API pod security context
  ## @param api.podSecurityContext.seccompProfile App API pod seccomp profile
  ## @param api.podSecurityContext.seccompProfile.type App API pod seccomp profile type
  ## @param api.containerSecurityContext.enabled Enable App API container security context
  ## @param api.containerSecurityContext.runAsNonRoot Require a non-root App API process
  ## @param api.containerSecurityContext.readOnlyRootFilesystem Use a read-only App API root filesystem
  ## @param api.containerSecurityContext.allowPrivilegeEscalation Allow App API privilege escalation
  ## @param api.containerSecurityContext.capabilities.drop App API Linux capabilities to drop
  ##
  podSecurityContext:
    enabled: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    enabled: true
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

  ## App API networking
  ##
  ## @param api.containerPorts.http App API container HTTP port
  ## @param api.service.type App API Service type
  ## @param api.service.annotations Additional App API Service annotations
  ## @param api.service.ports.http App API Service HTTP port
  ## @param api.service.clusterIP App API Service cluster IP
  ##
  containerPorts:
    http: 8000

  service:
    type: ClusterIP
    annotations: {}
    ports:
      http: 8000
    clusterIP: ""

  ## App API resources
  ##
  ## @param api.resources App API resource requests and limits
  ##
  resources: {}

  ## App API health probes
  ##
  ## @param api.livenessProbe.enabled Enable the App API liveness probe
  ## @param api.livenessProbe.spec App API liveness probe specification
  ## @param api.livenessProbe.spec.httpGet.path App API liveness probe HTTP path
  ## @param api.livenessProbe.spec.httpGet.port App API liveness probe port name
  ## @param api.readinessProbe.enabled Enable the App API readiness probe
  ## @param api.readinessProbe.spec App API readiness probe specification
  ## @param api.readinessProbe.spec.httpGet.path App API readiness probe HTTP path
  ## @param api.readinessProbe.spec.httpGet.port App API readiness probe port name
  ## @param api.startupProbe.enabled Enable the App API startup probe
  ## @param api.startupProbe.spec App API startup probe specification
  ## @param api.startupProbe.spec.httpGet.path App API startup probe HTTP path
  ## @param api.startupProbe.spec.httpGet.port App API startup probe port name
  ## @param api.startupProbe.spec.periodSeconds App API startup probe period in seconds
  ## @param api.startupProbe.spec.timeoutSeconds App API startup probe timeout in seconds
  ## @param api.startupProbe.spec.failureThreshold App API startup probe failure threshold
  ##
  livenessProbe:
    enabled: true
    spec:
      httpGet:
        path: /api/health
        port: http

  readinessProbe:
    enabled: true
    spec:
      httpGet:
        path: /api/health
        port: http

  startupProbe:
    enabled: true
    spec:
      httpGet:
        path: /api/health
        port: http
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 120

  ## App API pod placement
  ##
  ## @param api.podLabels Additional labels for App API pods
  ## @param api.podAnnotations Additional annotations for App API pods
  ## @param api.podAffinityPreset App API pod affinity preset; ignored when `api.affinity` is set
  ## @param api.podAntiAffinityPreset App API pod anti-affinity preset; ignored when `api.affinity` is set
  ## @param api.nodeAffinityPreset App API node affinity preset; ignored when `api.affinity` is set
  ## @param api.nodeAffinityPreset.type App API node affinity preset type
  ## @param api.nodeAffinityPreset.key App API node label key used by the affinity preset
  ## @param api.nodeAffinityPreset.values App API node label values used by the affinity preset
  ## @param api.affinity App API affinity rules
  ## @param api.nodeSelector Node labels for App API pod assignment
  ## @param api.tolerations Tolerations for App API pod assignment
  ## @param api.topologySpreadConstraints Topology spread constraints for App API pods
  ## @param api.priorityClassName App API pod priority class
  ## @param api.schedulerName Alternate Kubernetes scheduler for App API pods
  ## @param api.terminationGracePeriodSeconds App API pod termination grace period
  ##
  podLabels: {}
  podAnnotations: {}
  podAffinityPreset: ""
  podAntiAffinityPreset: soft

  nodeAffinityPreset:
    type: ""
    key: ""
    values: []

  affinity: {}
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  schedulerName: ""
  terminationGracePeriodSeconds: 30

  ## App API PodDisruptionBudget
  ##
  ## @param api.podDisruptionBudget.enabled Create an App API PodDisruptionBudget
  ## @param api.podDisruptionBudget.minAvailable Minimum number or percentage of available App API pods
  ## @param api.podDisruptionBudget.maxUnavailable Maximum number or percentage of unavailable App API pods
  ##
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
    maxUnavailable: ""

  ## App API database migration Job
  ##
  ## @param api.migration.enabled Run the App API database migration Job
  ## @param api.migration.annotations Additional annotations for the migration Job
  ## @param api.migration.ttlSecondsAfterFinished TTL for the completed migration Job
  ## @param api.migration.databaseConnection.attempts Maximum database connection attempts during migration
  ## @param api.migration.databaseConnection.retrySeconds Seconds between migration database connection attempts
  ## @param api.migration.databaseConnection.timeoutSeconds Timeout for each migration database connection attempt
  ## @param api.migration.extraEnvVars Additional environment variables for the migration container
  ##
  migration:
    enabled: false
    annotations:
      helm.sh/hook: post-install,post-upgrade
      helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    ttlSecondsAfterFinished: null
    databaseConnection:
      attempts: 180
      retrySeconds: 5
      timeoutSeconds: 5
    extraEnvVars: []

## @section App Agent parameters
##
## @param agent.replicaCount Number of App Agent replicas
## @param agent.revisionHistoryLimit Number of previous App Agent ReplicaSets retained for rollback
##
agent:
  replicaCount: 1
  revisionHistoryLimit: 10

  ## App Agent image
  ##
  ## @param agent.image.registry App Agent image registry
  ## @param agent.image.repository App Agent image repository
  ## @param agent.image.tag App Agent image tag
  ## @param agent.image.digest App Agent image digest; overrides the tag when set
  ## @param agent.image.pullPolicy App Agent image pull policy
  ## @param agent.image.pullSecrets App Agent image pull secrets
  ##
  image:
    registry: europe-west1-docker.pkg.dev
    repository: prod-common-cicd/opsdiag-docker-pub/opsdiag-app-agent-api
    tag: "2026-07-19.03-54-13.c9a9892"
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []

  ## App Agent deployment and runtime
  ##
  ## @param agent.updateStrategy App Agent Deployment update strategy
  ## @param agent.updateStrategy.type App Agent Deployment strategy type
  ## @param agent.updateStrategy.rollingUpdate.maxSurge Maximum number or percentage of additional App Agent pods during rollout
  ## @param agent.updateStrategy.rollingUpdate.maxUnavailable Maximum number or percentage of unavailable App Agent pods during rollout
  ## @param agent.config App Agent runtime configuration rendered to `/app/config.yaml`
  ## @param agent.config.license App Agent license
  ## @param agent.config.licenseServer Control Edge origin used for App Agent license verification
  ## @param agent.config.connector.enabled Enable connector-backed provider access
  ## @param agent.config.connector.url Control Relay origin used by the App Agent connector client
  ## @param agent.config.connector.license Connector client license
  ## @param agent.config.runtime.callbackBaseUrl Internal App API callback origin; rendered from the Helm release name
  ## @param agent.config.runtime.maxParallelNodes Maximum number of graph nodes executed in parallel
  ## @param agent.config.mcp.maxBodyBytes Maximum accepted MCP HTTP request body size
  ##
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  config:
    license: ""
    licenseServer: https://edge.control.opsdiag.ai
    runtime:
      callbackBaseUrl: 'http://{{ include "opsdiag-app.componentName" (dict "root" . "component" "api") }}:{{ .Values.api.service.ports.http }}'
      maxParallelNodes: 6
    mcp:
      maxBodyBytes: 1048576
    connector:
      enabled: true
      url: https://relay.control.opsdiag.ai
      license: ""

  ## Additional App Agent deployment settings
  ##
  ## @param agent.extraEnvVars Additional environment variables for the App Agent container
  ## @param agent.extraEnvVarsCM Existing ConfigMap containing additional App Agent environment variables
  ## @param agent.extraEnvVarsSecret Existing Secret containing additional App Agent environment variables
  ## @param agent.extraVolumes Additional volumes for App Agent pods
  ## @param agent.extraVolumeMounts Additional volume mounts for the App Agent container
  ## @param agent.extraDeploy Additional Kubernetes objects associated with App Agent
  ##
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  extraDeploy: []

  ## App Agent ServiceAccount
  ##
  ## @param agent.serviceAccount.create Create a ServiceAccount for App Agent
  ## @param agent.serviceAccount.name App Agent ServiceAccount name; generated when empty
  ## @param agent.serviceAccount.annotations Additional App Agent ServiceAccount annotations
  ## @param agent.serviceAccount.automountServiceAccountToken Mount the ServiceAccount token in App Agent pods
  ##
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  ## App Agent security contexts
  ##
  ## @param agent.podSecurityContext.enabled Enable App Agent pod security context
  ## @param agent.podSecurityContext.seccompProfile App Agent pod seccomp profile
  ## @param agent.podSecurityContext.seccompProfile.type App Agent pod seccomp profile type
  ## @param agent.containerSecurityContext.enabled Enable App Agent container security context
  ## @param agent.containerSecurityContext.runAsNonRoot Require a non-root App Agent process
  ## @param agent.containerSecurityContext.readOnlyRootFilesystem Use a read-only App Agent root filesystem
  ## @param agent.containerSecurityContext.allowPrivilegeEscalation Allow App Agent privilege escalation
  ## @param agent.containerSecurityContext.capabilities.drop App Agent Linux capabilities to drop
  ##
  podSecurityContext:
    enabled: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    enabled: true
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

  ## App Agent networking
  ##
  ## @param agent.containerPorts.http App Agent container HTTP port
  ## @param agent.service.type App Agent Service type
  ## @param agent.service.annotations Additional App Agent Service annotations
  ## @param agent.service.ports.http App Agent Service HTTP port
  ## @param agent.service.clusterIP App Agent Service cluster IP
  ##
  containerPorts:
    http: 8000

  service:
    type: ClusterIP
    annotations: {}
    ports:
      http: 8000
    clusterIP: ""

  ## App Agent resources
  ##
  ## @param agent.resources App Agent resource requests and limits
  ##
  resources: {}

  ## App Agent health probes
  ##
  ## @param agent.livenessProbe.enabled Enable the App Agent liveness probe
  ## @param agent.livenessProbe.spec App Agent liveness probe specification
  ## @param agent.livenessProbe.spec.httpGet.path App Agent liveness probe HTTP path
  ## @param agent.livenessProbe.spec.httpGet.port App Agent liveness probe port name
  ## @param agent.livenessProbe.spec.periodSeconds App Agent liveness probe period in seconds
  ## @param agent.livenessProbe.spec.timeoutSeconds App Agent liveness probe timeout in seconds
  ## @param agent.livenessProbe.spec.failureThreshold App Agent liveness probe failure threshold
  ## @param agent.readinessProbe.enabled Enable the App Agent readiness probe
  ## @param agent.readinessProbe.spec App Agent readiness probe specification
  ## @param agent.readinessProbe.spec.httpGet.path App Agent readiness probe HTTP path
  ## @param agent.readinessProbe.spec.httpGet.port App Agent readiness probe port name
  ## @param agent.readinessProbe.spec.periodSeconds App Agent readiness probe period in seconds
  ## @param agent.readinessProbe.spec.timeoutSeconds App Agent readiness probe timeout in seconds
  ## @param agent.readinessProbe.spec.failureThreshold App Agent readiness probe failure threshold
  ## @param agent.startupProbe.enabled Enable the App Agent startup probe
  ## @param agent.startupProbe.spec App Agent startup probe specification
  ## @param agent.startupProbe.spec.httpGet.path App Agent startup probe HTTP path
  ## @param agent.startupProbe.spec.httpGet.port App Agent startup probe port name
  ## @param agent.startupProbe.spec.periodSeconds App Agent startup probe period in seconds
  ## @param agent.startupProbe.spec.timeoutSeconds App Agent startup probe timeout in seconds
  ## @param agent.startupProbe.spec.failureThreshold App Agent startup probe failure threshold
  ##
  livenessProbe:
    enabled: true
    spec:
      httpGet:
        path: /livez
        port: http
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3

  readinessProbe:
    enabled: true
    spec:
      httpGet:
        path: /readyz
        port: http
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3

  startupProbe:
    enabled: true
    spec:
      httpGet:
        path: /readyz
        port: http
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 60

  ## App Agent pod placement
  ##
  ## @param agent.podLabels Additional labels for App Agent pods
  ## @param agent.podAnnotations Additional annotations for App Agent pods
  ## @param agent.podAffinityPreset App Agent pod affinity preset; ignored when `agent.affinity` is set
  ## @param agent.podAntiAffinityPreset App Agent pod anti-affinity preset; ignored when `agent.affinity` is set
  ## @param agent.nodeAffinityPreset App Agent node affinity preset; ignored when `agent.affinity` is set
  ## @param agent.nodeAffinityPreset.type App Agent node affinity preset type
  ## @param agent.nodeAffinityPreset.key App Agent node label key used by the affinity preset
  ## @param agent.nodeAffinityPreset.values App Agent node label values used by the affinity preset
  ## @param agent.affinity App Agent affinity rules
  ## @param agent.nodeSelector Node labels for App Agent pod assignment
  ## @param agent.tolerations Tolerations for App Agent pod assignment
  ## @param agent.topologySpreadConstraints Topology spread constraints for App Agent pods
  ## @param agent.priorityClassName App Agent pod priority class
  ## @param agent.schedulerName Alternate Kubernetes scheduler for App Agent pods
  ## @param agent.terminationGracePeriodSeconds App Agent pod termination grace period
  ##
  podLabels: {}
  podAnnotations: {}
  podAffinityPreset: ""
  podAntiAffinityPreset: soft

  nodeAffinityPreset:
    type: ""
    key: ""
    values: []

  affinity: {}
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  schedulerName: ""
  terminationGracePeriodSeconds: 30

  ## App Agent PodDisruptionBudget
  ##
  ## @param agent.podDisruptionBudget.enabled Create an App Agent PodDisruptionBudget
  ## @param agent.podDisruptionBudget.minAvailable Minimum number or percentage of available App Agent pods
  ## @param agent.podDisruptionBudget.maxUnavailable Maximum number or percentage of unavailable App Agent pods
  ##
  podDisruptionBudget:
    enabled: false
    minAvailable: ""
    maxUnavailable: ""

