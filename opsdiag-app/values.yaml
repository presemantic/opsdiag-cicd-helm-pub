## @section Global parameters
global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
commonLabels: {}
commonAnnotations: {}
extraDeploy: []

## @section App API
api:
  enabled: true
  image:
    registry: europe-west1-docker.pkg.dev
    repository: prod-common-cicd/opsdiag-docker-pub/opsdiag-app-api
    tag: "2026-07-18.22-10-12.bec3c6c"
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []
  replicaCount: 2
  revisionHistoryLimit: 10
  updateStrategy:
    type: RollingUpdate
  command: []
  args: []
  config:
    scheduler:
      url: 'http://{{ include "opsdiag-app.componentName" (dict "root" . "component" "sched") }}:{{ .Values.sched.service.ports.http }}'
  configPathEnv:
    enabled: true
    name: CONFIG_PATH
  schedulerWorkerToken:
    value: ""
    existingSecret: ""
    key: worker-token
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  extraDeploy: []
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false
  podSecurityContext:
    enabled: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    enabled: true
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  containerPorts:
    http: 8000
  service:
    type: ClusterIP
    annotations: {}
    ports:
      http: 8000
    clusterIP: ""
  resourcesPreset: nano
  resources: {}
  livenessProbe:
    enabled: true
    spec:
      httpGet:
        path: /api/health
        port: http
  readinessProbe:
    enabled: true
    spec:
      httpGet:
        path: /api/health
        port: http
  startupProbe:
    enabled: true
    spec:
      httpGet:
        path: /api/health
        port: http
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 120
  podLabels: {}
  podAnnotations: {}
  podAffinityPreset: ""
  podAntiAffinityPreset: soft
  nodeAffinityPreset:
    type: ""
    key: ""
    values: []
  affinity: {}
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  schedulerName: ""
  terminationGracePeriodSeconds: 30
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
    maxUnavailable: ""
  migration:
    enabled: false
    annotations:
      helm.sh/hook: post-install,post-upgrade
      helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    ttlSecondsAfterFinished: null
    command:
      - /opt/app/bin/opsdiag-app-api
    args: [migrate]
    extraEnvVars: []

## @section App Agent
agent:
  enabled: true
  image:
    registry: europe-west1-docker.pkg.dev
    repository: prod-common-cicd/opsdiag-docker-pub/opsdiag-app-agent-api
    tag: "2026-07-18.22-10-09.852a125"
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []
  replicaCount: 1
  revisionHistoryLimit: 10
  updateStrategy:
    type: RollingUpdate
  command: []
  args: []
  config: {}
  runtime:
    agentKind: root
    licenseService: opsdiag-app-agent
    localDispatch: true
    maxParallelNodes: 6
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  extraDeploy: []
  serviceAccount:
    create: true
