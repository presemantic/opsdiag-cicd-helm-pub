  ## @param front.nodeAffinityPreset.type App Frontend node affinity preset type
  ## @param front.nodeAffinityPreset.key App Frontend node label key used by the affinity preset
  ## @param front.nodeAffinityPreset.values App Frontend node label values used by the affinity preset
  ## @param front.affinity App Frontend affinity rules
  ## @param front.nodeSelector Node labels for App Frontend pod assignment
  ## @param front.tolerations Tolerations for App Frontend pod assignment
  ## @param front.topologySpreadConstraints Topology spread constraints for App Frontend pods
