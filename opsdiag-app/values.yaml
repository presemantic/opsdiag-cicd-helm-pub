    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    enabled: true
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  containerPorts:
    http: 8000
  service:
    type: ClusterIP
    annotations: {}
    ports:
      http: 8000
    clusterIP: ""
  resourcesPreset: nano
  resources: {}
  livenessProbe:
    enabled: true
    spec:
      httpGet:
        path: /livez
        port: http
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
  readinessProbe:
    enabled: true
    spec:
      httpGet:
        path: /readyz
        port: http
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
  startupProbe:
    enabled: true
    spec:
      httpGet:
        path: /readyz
        port: http
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 60
  podLabels: {}
  podAnnotations: {}
  podAffinityPreset: ""
  podAntiAffinityPreset: soft
  nodeAffinityPreset:
    type: ""
    key: ""
    values: []
  affinity: {}
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  schedulerName: ""
  terminationGracePeriodSeconds: 30
  podDisruptionBudget:
    enabled: false
    minAvailable: ""
    maxUnavailable: ""

