## @section App Scheduler parameters
##
## @param sched App Scheduler component settings
sched:
  ## @param sched.replicaCount Number of App Scheduler replicas
  replicaCount: 1
  ## @param sched.revisionHistoryLimit Number of previous App Scheduler ReplicaSets retained for rollback
  revisionHistoryLimit: 10

  ## App Scheduler image
  ##
  ## @param sched.image App Scheduler container image settings
  image:
    ## @param sched.image.registry App Scheduler image registry
    registry: europe-west1-docker.pkg.dev
    ## @param sched.image.repository App Scheduler image repository
    repository: prod-common-cicd/opsdiag-docker-pub/opsdiag-app-sched
    ## @param sched.image.tag App Scheduler image tag
    tag: "2026-07-19.14-54-28.26159d4"
    ## @param sched.image.digest App Scheduler image digest; overrides the tag when set
    digest: ""
    ## @param sched.image.pullPolicy App Scheduler image pull policy
    pullPolicy: IfNotPresent
    ## @param sched.image.pullSecrets App Scheduler image pull secrets
    pullSecrets: []

  ## App Scheduler deployment and runtime
  ##
  ## @param sched.updateStrategy App Scheduler Deployment update strategy
  updateStrategy:
    ## @param sched.updateStrategy.type App Scheduler Deployment strategy type
    type: RollingUpdate

  ## @param sched.config App Scheduler runtime configuration rendered to `/app/config.yaml`
  config:
    ## @param sched.config.license App Scheduler license
    license: ""
    ## @param sched.config.licenseServer Control Edge origin used for App Scheduler license verification
    licenseServer: https://edge.control.opsdiag.ai
    ## @param sched.config.runtime App Scheduler runtime settings
    runtime:
      ## @param sched.config.runtime.readHeaderTimeoutSeconds Scheduler HTTP read-header timeout
      readHeaderTimeoutSeconds: 10
      ## @param sched.config.runtime.providerTimeoutSeconds Upstream provider request timeout
      providerTimeoutSeconds: 60
    ## @param sched.config.scheduler App Scheduler connection settings for App API
    scheduler:
      ## @param sched.config.scheduler.appApiUrl Internal App API URL; rendered from the Helm release name
      appApiUrl: 'http://{{ include "opsdiag-app.componentName" (dict "root" . "component" "api") }}:{{ .Values.api.service.ports.http }}'
      ## @param sched.config.scheduler.workerToken Shared App Scheduler worker token
      workerToken: ""

  ## Additional App Scheduler deployment settings
  ##
  ## @param sched.extraEnvVars Additional environment variables for the App Scheduler container
  extraEnvVars: []
  ## @param sched.extraEnvVarsCM Existing ConfigMap containing additional App Scheduler environment variables
  extraEnvVarsCM: ""
  ## @param sched.extraEnvVarsSecret Existing Secret containing additional App Scheduler environment variables
  extraEnvVarsSecret: ""
  ## App Scheduler ServiceAccount
  ##
  ## @param sched.serviceAccount App Scheduler ServiceAccount settings
  serviceAccount:
    ## @param sched.serviceAccount.create Create a ServiceAccount for App Scheduler
    create: true
    ## @param sched.serviceAccount.name App Scheduler ServiceAccount name; generated when empty
    name: ""
    ## @param sched.serviceAccount.annotations Additional App Scheduler ServiceAccount annotations
    annotations: {}
    ## @param sched.serviceAccount.automountServiceAccountToken Mount the ServiceAccount token in App Scheduler pods
    automountServiceAccountToken: false

  ## App Scheduler security contexts
  ##
  ## @param sched.podSecurityContext App Scheduler pod security context settings
  podSecurityContext:
    ## @param sched.podSecurityContext.enabled Enable App Scheduler pod security context
    enabled: true
    ## @param sched.podSecurityContext.seccompProfile App Scheduler pod seccomp profile
    seccompProfile:
      ## @param sched.podSecurityContext.seccompProfile.type App Scheduler pod seccomp profile type
      type: RuntimeDefault

  ## @param sched.containerSecurityContext App Scheduler container security context settings
  containerSecurityContext:
    ## @param sched.containerSecurityContext.enabled Enable App Scheduler container security context
    enabled: true
    ## @param sched.containerSecurityContext.runAsNonRoot Require a non-root App Scheduler process
    runAsNonRoot: true
    ## @param sched.containerSecurityContext.readOnlyRootFilesystem Use a read-only App Scheduler root filesystem
    readOnlyRootFilesystem: true
    ## @param sched.containerSecurityContext.allowPrivilegeEscalation Allow App Scheduler privilege escalation
    allowPrivilegeEscalation: false
    ## @param sched.containerSecurityContext.capabilities App Scheduler container Linux capability settings
    capabilities:
      ## @param sched.containerSecurityContext.capabilities.drop App Scheduler Linux capabilities to drop
      drop: [ALL]

  ## App Scheduler networking
  ##
  ## @param sched.containerPorts App Scheduler container port settings
  containerPorts:
    ## @param sched.containerPorts.http App Scheduler container HTTP port
    http: 8000

  ## @param sched.service App Scheduler Service settings
  service:
    ## @param sched.service.type App Scheduler Service type
    type: ClusterIP
    ## @param sched.service.annotations Additional App Scheduler Service annotations
    annotations: {}
    ## @param sched.service.ports App Scheduler Service port settings
    ports:
      ## @param sched.service.ports.http App Scheduler Service HTTP port
      http: 8000
    ## @param sched.service.clusterIP App Scheduler Service cluster IP
    clusterIP: ""

  ## App Scheduler resources
  ##
  ## @param sched.resources App Scheduler resource requests and limits
  resources: {}

  ## App Scheduler health probes
  ##
  ## @param sched.livenessProbe App Scheduler liveness probe settings
  livenessProbe:
    ## @param sched.livenessProbe.enabled Enable the App Scheduler liveness probe
    enabled: true
    ## @param sched.livenessProbe.spec App Scheduler liveness probe specification
    spec:
      ## @param sched.livenessProbe.spec.httpGet App Scheduler liveness probe HTTP request settings
      httpGet:
        ## @param sched.livenessProbe.spec.httpGet.path App Scheduler liveness probe HTTP path
        path: /api/live
        ## @param sched.livenessProbe.spec.httpGet.port App Scheduler liveness probe port name
        port: http

  ## @param sched.readinessProbe App Scheduler readiness probe settings
  readinessProbe:
    ## @param sched.readinessProbe.enabled Enable the App Scheduler readiness probe
    enabled: true
    ## @param sched.readinessProbe.spec App Scheduler readiness probe specification
    spec:
      ## @param sched.readinessProbe.spec.httpGet App Scheduler readiness probe HTTP request settings
      httpGet:
        ## @param sched.readinessProbe.spec.httpGet.path App Scheduler readiness probe HTTP path
        path: /api/ready
        ## @param sched.readinessProbe.spec.httpGet.port App Scheduler readiness probe port name
        port: http
      ## @param sched.readinessProbe.spec.timeoutSeconds App Scheduler readiness probe timeout in seconds
      timeoutSeconds: 3

  ## @param sched.startupProbe App Scheduler startup probe settings
  startupProbe:
    ## @param sched.startupProbe.enabled Enable the App Scheduler startup probe
    enabled: false
    ## @param sched.startupProbe.spec App Scheduler startup probe specification
    spec: {}

  ## App Scheduler pod placement
  ##
  ## @param sched.podLabels Additional labels for App Scheduler pods
  podLabels: {}
  ## @param sched.podAnnotations Additional annotations for App Scheduler pods
  podAnnotations: {}
  ## @param sched.podAffinityPreset App Scheduler pod affinity preset; ignored when `sched.affinity` is set
  podAffinityPreset: ""
  ## @param sched.podAntiAffinityPreset App Scheduler pod anti-affinity preset; ignored when `sched.affinity` is set
  podAntiAffinityPreset: soft

  ## @param sched.nodeAffinityPreset App Scheduler node affinity preset; ignored when `sched.affinity` is set
  nodeAffinityPreset:
    ## @param sched.nodeAffinityPreset.type App Scheduler node affinity preset type
    type: ""
    ## @param sched.nodeAffinityPreset.key App Scheduler node label key used by the affinity preset
    key: ""
    ## @param sched.nodeAffinityPreset.values App Scheduler node label values used by the affinity preset
    values: []

  ## @param sched.affinity App Scheduler affinity rules
  affinity: {}
  ## @param sched.nodeSelector Node labels for App Scheduler pod assignment
  nodeSelector: {}
  ## @param sched.tolerations Tolerations for App Scheduler pod assignment
  tolerations: []
  ## @param sched.topologySpreadConstraints Topology spread constraints for App Scheduler pods
  topologySpreadConstraints: []
  ## @param sched.priorityClassName App Scheduler pod priority class
  priorityClassName: ""
  ## @param sched.schedulerName Alternate Kubernetes scheduler for App Scheduler pods
  schedulerName: ""
  ## @param sched.terminationGracePeriodSeconds App Scheduler pod termination grace period
  terminationGracePeriodSeconds: 30

  ## App Scheduler PodDisruptionBudget
  ##
  ## @param sched.podDisruptionBudget App Scheduler PodDisruptionBudget settings
  podDisruptionBudget:
    ## @param sched.podDisruptionBudget.enabled Create an App Scheduler PodDisruptionBudget
    enabled: false
    ## @param sched.podDisruptionBudget.minAvailable Minimum number or percentage of available App Scheduler pods
    minAvailable: ""
    ## @param sched.podDisruptionBudget.maxUnavailable Maximum number or percentage of unavailable App Scheduler pods
    maxUnavailable: ""

## @section Kubernetes Ingress parameters
##
## @param ingress Kubernetes Ingress settings for App API and App Frontend
ingress:
  ## @param ingress.enabled Create a Kubernetes Ingress for App API and App Frontend
  enabled: false
  ## @param ingress.hostname Default hostname for the App Ingress
  hostname: app.local
  ## @param ingress.ingressClassName IngressClass used by the App Ingress
  ingressClassName: ""
  ## @param ingress.annotations Additional Ingress annotations
  annotations: {}
  ## @param ingress.tls Enable TLS for `ingress.hostname`; the TLS Secret name is derived as `<hostname>-tls`
  tls: false

  ## @param ingress.extraHosts Additional hostnames that expose the same complete App routing
  ## E.g.:
  ## extraHosts:
  ##   - name: app-alt.example.com
  extraHosts: []

  ## @param ingress.extraPaths Additional paths inserted before the chart-owned `/api` and `/` paths on the primary hostname
  ## E.g.:
  ## extraPaths:
  ##   - path: /special
  ##     pathType: Prefix
  ##     backend:
  ##       service:
  ##         name: special-service
  ##         port:
  ##           name: http
  extraPaths: []

  ## @param ingress.extraTls Additional TLS entries for extra hostnames
  ## E.g.:
  ## extraTls:
  ##   - hosts:
  ##       - app-alt.example.com
  ##     secretName: app-alt.example.com-tls
  extraTls: []

  ## @param ingress.extraRules Additional complete Ingress rules rendered after the chart-owned rules
  extraRules: []

## @section OpenShift Route parameters
##
## @param openshiftRoute OpenShift Route settings for App API and App Frontend
openshiftRoute:
  ## @param openshiftRoute.enabled Create OpenShift Routes for App API and App Frontend
  enabled: false
  ## @param openshiftRoute.hostname Shared OpenShift Route hostname
  hostname: app.local
  ## @param openshiftRoute.annotations Additional annotations applied to both Routes
  annotations: {}

  ## @param openshiftRoute.tls OpenShift Route TLS settings
  tls:
    ## @param openshiftRoute.tls.enabled Enable TLS on the chart-owned Routes
    enabled: false
    ## @param openshiftRoute.tls.termination OpenShift Route TLS termination mode
    termination: edge
    ## @param openshiftRoute.tls.insecureEdgeTerminationPolicy Policy for insecure traffic when TLS is enabled
    insecureEdgeTerminationPolicy: Redirect
    ## @param openshiftRoute.tls.certificate Optional PEM certificate embedded in each Route
    certificate: ""
    ## @param openshiftRoute.tls.key Optional PEM private key embedded in each Route
    key: ""
    ## @param openshiftRoute.tls.caCertificate Optional PEM CA certificate embedded in each Route
    caCertificate: ""
    ## @param openshiftRoute.tls.destinationCACertificate Optional destination CA certificate for re-encrypt termination
    destinationCACertificate: ""

  ## @param openshiftRoute.extraHosts Additional hostnames that expose the same complete App routing
  ## E.g.:
  ## extraHosts:
  ##   - name: app-alt.example.com
  extraHosts: []

  ## @param openshiftRoute.extraRoutes Additional OpenShift Route specs with optional annotations; resource names remain chart-owned
  ## E.g.:
  ## extraRoutes:
  ##   - annotations: {}
  ##     spec:
  ##       host: special.example.com
  ##       to:
  ##         kind: Service
  ##         name: special-service
  ##       port:
  ##         targetPort: http
  extraRoutes: []

## @section Istio exposure parameters
##
## @param istio Istio exposure settings for App API and App Frontend
istio:
  ## @param istio.enabled Create Istio exposure resources
  enabled: false
  ## @param istio.hostname Default hostname for the Istio Gateway and VirtualService
  hostname: app.local
  ## @param istio.annotations Additional annotations applied to both Istio resources
  annotations: {}

  ## @param istio.gateway Istio Gateway settings
  gateway:
    ## @param istio.gateway.annotations Additional Istio Gateway annotations
    annotations: {}
    ## @param istio.gateway.selector Workload selector for the Istio ingress gateway
    selector:
      ## @param istio.gateway.selector.istio Label value selecting the Istio ingress gateway workload
      istio: ingressgateway

    ## @param istio.gateway.tls Istio Gateway TLS settings
    tls:
      ## @param istio.gateway.tls.enabled Enable HTTPS on the chart-owned Gateway
      enabled: false
      ## @param istio.gateway.tls.credentialName Kubernetes TLS Secret used by the Istio ingress gateway
      credentialName: ""
      ## @param istio.gateway.tls.mode Istio TLS mode
      mode: SIMPLE
      ## @param istio.gateway.tls.httpsRedirect Redirect the chart-owned HTTP listener to HTTPS
      httpsRedirect: true

  ## @param istio.virtualService Istio VirtualService settings
  virtualService:
    ## @param istio.virtualService.annotations Additional Istio VirtualService annotations
    annotations: {}

  ## @param istio.extraHosts Additional hostnames exposed by the same Gateway and VirtualService
  ## E.g.:
  ## extraHosts:
  ##   - app-alt.example.com
  extraHosts: []

  ## @param istio.extraHttp Additional Istio HTTP routes inserted before the chart-owned `/api` and `/` routes
  ## E.g.:
  ## extraHttp:
  ##   - name: special
  ##     match:
  ##       - uri:
  ##           prefix: /special
  ##     route:
  ##       - destination:
  ##           host: special-service
  ##           port:
  ##             number: 8080
  extraHttp: []
